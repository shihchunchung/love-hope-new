pre-commit:
  parallel: true
  jobs:
    - name: prettier
      glob: "*.{js,jsx,ts,tsx,json,css,md,yml,yaml}"
      run: pnpm prettier --check {staged_files}

    - name: eslint
      glob: "*.{js,jsx,ts,tsx}"
      run: pnpm eslint {staged_files}

    - name: typecheck
      glob: "*.{ts,tsx}"
      run: pnpm typecheck
